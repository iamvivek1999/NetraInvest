name: enigma_invest
description: Enigma Invest — Transparent startup investment platform (MERN + Razorpay + Blockchain)
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.1.1

  # HTTP Client
  http: ^1.1.2

  # Local Storage (token, session)
  shared_preferences: ^2.2.2

  # UI Components
  cupertino_icons: ^1.0.6

  # Date/Currency formatting
  intl: ^0.19.0

  http_parser: any
  fl_chart: any
  google_fonts: ^8.0.2
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
